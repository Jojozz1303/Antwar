<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antwar Clock - Horloge Mondiale</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 40px;
            font-size: 1.1em;
        }

        .clocks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .clock-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            padding: 20px;
            color: white;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease;
        }

        .clock-card:hover {
            transform: translateY(-5px);
        }

        .clock-city {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .clock-time {
            font-size: 2.5em;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            margin: 15px 0;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .clock-timezone {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .analog-clock {
            width: 200px;
            height: 200px;
            border: 8px solid white;
            border-radius: 50%;
            position: relative;
            background: white;
            margin: 0 auto 20px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.2);
        }

        .analog-clock::before {
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            background: #667eea;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom center;
            background: #667eea;
            border-radius: 10px;
        }

        .hour-hand {
            width: 6px;
            height: 60px;
            margin-left: -3px;
        }

        .minute-hand {
            width: 4px;
            height: 80px;
            margin-left: -2px;
            background: #764ba2;
        }

        .second-hand {
            width: 2px;
            height: 90px;
            margin-left: -1px;
            background: #ff6b6b;
        }

        .controls {
            background: #f5f5f5;
            border-radius: 15px;
            padding: 20px;
            margin-top: 30px;
        }

        .control-group {
            margin-bottom: 15px;
        }

        .control-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }

        .control-group select,
        .control-group button {
            width: 100%;
            padding: 10px;
            border: 2px solid #667eea;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
        }

        .control-group select {
            background: white;
            color: #333;
        }

        .control-group button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: bold;
            transition: transform 0.2s ease;
        }

        .control-group button:hover {
            transform: scale(1.02);
        }

        .timezone-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }

        .timezone-option {
            padding: 10px;
            background: white;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .timezone-option:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .timezone-option.selected {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
        }

        .info-panel {
            background: #e8f4f8;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }

        .info-panel h3 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .info-panel p {
            color: #333;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⏰ Antwar Clock</h1>
        <p class="subtitle">Horloge mondiale pour Antwar</p>

        <div class="clocks-grid" id="clocksGrid"></div>

        <div class="controls">
            <div class="control-group">
                <label>Sélectionnez les fuseaux horaires :</label>
                <div class="timezone-list" id="timezoneList"></div>
            </div>
            <div class="control-group">
                <button onclick="addCustomTimezone()">➕ Ajouter un fuseau horaire</button>
            </div>
            <div class="control-group">
                <button onclick="resetToDefault()">🔄 Réinitialiser</button>
            </div>
        </div>

        <div class="info-panel">
            <h3>ℹ️ À propos</h3>
            <p>Cette horloge affiche l'heure dans différents fuseaux horaires du monde. Cliquez sur les fuseaux horaires pour les ajouter ou les retirer.</p>
        </div>
    </div>

    <script>
        const timezones = [
            { name: 'Paris', offset: 'Europe/Paris', color: '#667eea' },
            { name: 'New York', offset: 'America/New_York', color: '#764ba2' },
            { name: 'Tokyo', offset: 'Asia/Tokyo', color: '#f093fb' },
            { name: 'Sydney', offset: 'Australia/Sydney', color: '#4facfe' },
            { name: 'Dubai', offset: 'Asia/Dubai', color: '#43e97b' },
            { name: 'Los Angeles', offset: 'America/Los_Angeles', color: '#fa709a' },
            { name: 'Londres', offset: 'Europe/London', color: '#30cfd0' },
            { name: 'Bangkok', offset: 'Asia/Bangkok', color: '#a8edea' },
            { name: 'Mexico City', offset: 'America/Mexico_City', color: '#fed6e3' },
            { name: 'Hong Kong', offset: 'Asia/Hong_Kong', color: '#ff9a56' }
        ];

        let selectedTimezones = ['Paris', 'New York', 'Tokyo', 'Sydney'];

        function initializeTimezoneList() {
            const list = document.getElementById('timezoneList');
            list.innerHTML = '';
            timezones.forEach(tz => {
                const option = document.createElement('div');
                option.className = `timezone-option ${selectedTimezones.includes(tz.name) ? 'selected' : ''}`;
                option.textContent = tz.name;
                option.onclick = () => toggleTimezone(tz.name);
                list.appendChild(option);
            });
        }

        function toggleTimezone(name) {
            const index = selectedTimezones.indexOf(name);
            if (index > -1) {
                selectedTimezones.splice(index, 1);
            } else {
                selectedTimezones.push(name);
            }
            initializeTimezoneList();
            updateClocks();
        }

        function getTimeInTimezone(tzName) {
            const tz = timezones.find(t => t.name === tzName);
            if (!tz) return null;

            const now = new Date();
            const formatter = new Intl.DateTimeFormat('fr-FR', {
                timeZone: tz.offset,
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            return formatter.format(now);
        }

        function updateClocks() {
            const grid = document.getElementById('clocksGrid');
            grid.innerHTML = '';

            selectedTimezones.forEach(tzName => {
                const tz = timezones.find(t => t.name === tzName);
                const time = getTimeInTimezone(tzName);
                const card = document.createElement('div');
                card.className = 'clock-card';
                card.style.background = `linear-gradient(135deg, ${tz.color} 0%, ${adjustColor(tz.color, -20)} 100%)`;
                
                card.innerHTML = `
                    <div class="clock-city">${tzName}</div>
                    <div class="analog-clock" id="clock-${tzName}"></div>
                    <div class="clock-time">${time}</div>
                    <div class="clock-timezone">${tz.offset}</div>
                `;
                grid.appendChild(card);
                drawAnalogClock(`clock-${tzName}`, tzName);
            });
        }

        function drawAnalogClock(elementId, tzName) {
            const element = document.getElementById(elementId);
            if (!element) return;

            const now = new Date();
            const formatter = new Intl.DateTimeFormat('en-US', {
                timeZone: timezones.find(t => t.name === tzName).offset,
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            });
            const timeString = formatter.format(now);
            const [hours, minutes, seconds] = timeString.split(':').map(Number);

            const hourDeg = (hours % 12) * 30 + minutes * 0.5;
            const minuteDeg = minutes * 6 + seconds * 0.1;
            const secondDeg = seconds * 6;

            element.innerHTML = `
                <div class="hand hour-hand" style="transform: rotate(${hourDeg}deg);"></div>
                <div class="hand minute-hand" style="transform: rotate(${minuteDeg}deg);"></div>
                <div class="hand second-hand" style="transform: rotate(${secondDeg}deg);"></div>
            `;
        }

        function adjustColor(color, percent) {
            const num = parseInt(color.replace("#",""), 16);
            const amt = Math.round(2.55 * percent);
            const R = Math.min(255, Math.max(0, (num >> 16) + amt));
            const G = Math.min(255, Math.max(0, (num >> 8 & 0x00FF) + amt));
            const B = Math.min(255, Math.max(0, (num & 0x0000FF) + amt));
            return "#" + (0x1000000 + R * 0x10000 + G * 0x100 + B).toString(16).slice(1);
        }

        function addCustomTimezone() {
            const input = prompt('Entrez le nom du fuseau horaire (ex: Singapore)');
            if (input) {
                const tzInput = prompt('Entrez le fuseau horaire IANA (ex: Asia/Singapore)');
                if (tzInput) {
                    timezones.push({ name: input, offset: tzInput, color: '#' + Math.floor(Math.random()*16777215).toString(16) });
                    selectedTimezones.push(input);
                    initializeTimezoneList();
                    updateClocks();
                }
            }
        }

        function resetToDefault() {
            selectedTimezones = ['Paris', 'New York', 'Tokyo', 'Sydney'];
            initializeTimezoneList();
            updateClocks();
        }

        // Initialiser et mettre à jour
        initializeTimezoneList();
        updateClocks();
        setInterval(updateClocks, 1000);
    </script>
</body>
</html>
